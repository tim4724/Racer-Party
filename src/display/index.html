<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Racer</title>
    <meta name="description" content="Couch party racing — play on your TV, control with your phone." />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Mobile screen hint -->
    <div id="mobile-hint">
      <h1 class="gradient-title">RACER</h1>
      <div id="mobile-hint-body">
        <p id="mobile-hint-heading">Open on a Larger Screen</p>
        <p id="mobile-hint-detail">This display is designed for TVs and computers. Use your phone as a controller instead.</p>
      </div>
      <button id="mobile-hint-btn" class="btn btn-secondary">CONTINUE ANYWAY</button>
    </div>

    <!-- Welcome screen: unlocks audio via user gesture -->
    <div id="welcome-screen" class="screen">
      <h1 class="gradient-title">RACER</h1>
      <button id="new-game-btn" class="btn btn-primary">START NEW GAME</button>
    </div>

    <!-- Lobby screen: QR code + player list + start button -->
    <div id="lobby-screen" class="screen hidden">
      <h1 class="gradient-title">RACER</h1>
      <div id="qr-container">
        <canvas id="qr-code" width="360" height="360"></canvas>
        <p id="qr-label">SCAN TO JOIN</p>
        <p id="join-url">…</p>
      </div>
      <div id="player-list"></div>
      <button id="start-btn" class="btn btn-primary" disabled>WAITING FOR PLAYERS…</button>
      <p class="lobby-hint">AI fills empty seats up to 4 cars.</p>
    </div>

    <!-- Game toolbar (mute + fullscreen + pause) — visible across lobby and game -->
    <div id="game-toolbar">
      <button id="mute-btn" class="icon-btn" title="Toggle mute" aria-label="Toggle mute">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
          <path class="sound-waves" d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14" />
        </svg>
      </button>
      <button id="fullscreen-btn" class="icon-btn" title="Toggle fullscreen" aria-label="Toggle fullscreen">
        <svg width="22" height="22" viewBox="0 0 18 18" fill="currentColor">
          <path d="M3 3h4V1H1v6h2V3zM11 1v2h4v4h2V1h-6zM15 15h-4v2h6v-6h-2v4zM3 11H1v6h6v-2H3v-4z" />
        </svg>
      </button>
      <button id="pause-btn" class="icon-btn hidden" title="Pause" aria-label="Pause">
        <span class="pause-icon"></span>
      </button>
    </div>

    <!-- Game canvas: the Three.js renderer mounts here -->
    <div id="game-screen" class="screen hidden">
      <canvas id="game-canvas"></canvas>
      <div id="hud-layer"></div>
      <div id="countdown-overlay" class="hidden">
        <div id="countdown-value">3</div>
      </div>
    </div>

    <!-- Display-side reconnect overlay (relay dropped the display) -->
    <div id="display-reconnect-overlay" class="game-overlay hidden">
      <h1 id="display-reconnect-heading" class="gradient-title">RECONNECTING</h1>
      <p id="display-reconnect-status">Connection lost…</p>
      <button id="display-reconnect-btn" class="btn btn-primary hidden">RECONNECT</button>
    </div>

    <!-- Pause overlay (sits above game screen) -->
    <div id="pause-overlay" class="game-overlay hidden">
      <h1 class="gradient-title">PAUSED</h1>
      <div id="pause-buttons">
        <button id="pause-continue-btn" class="btn btn-primary">CONTINUE</button>
        <button id="pause-newgame-btn" class="btn btn-secondary">NEW GAME</button>
      </div>
    </div>

    <!-- Results screen: shown after the race ends -->
    <div id="results-screen" class="screen hidden">
      <h1 class="gradient-title">RESULTS</h1>
      <ol id="standings"></ol>
      <div id="results-buttons">
        <button id="play-again-btn" class="btn btn-primary">PLAY AGAIN</button>
        <button id="new-game-results-btn" class="btn btn-secondary">NEW GAME</button>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
