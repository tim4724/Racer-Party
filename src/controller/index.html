<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0b1020" />
    <title>Racer Controller</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Name entry screen -->
    <div id="name-screen" class="screen">
      <h1 class="gradient-title">RACER</h1>
      <form id="name-form" class="name-form">
        <input
          id="name-input"
          type="text"
          maxlength="16"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="words"
          spellcheck="false"
          placeholder="Your name"
        />
      </form>
      <div id="room-gone-message" class="room-gone hidden">
        <p id="room-gone-heading">Room not found</p>
        <p id="room-gone-detail">Scan the QR on the display to join.</p>
      </div>
      <p id="status-text" class="status"></p>
      <p id="status-detail" class="status status-detail"></p>
      <button type="button" id="join-btn" class="btn btn-primary">JOIN</button>
    </div>

    <!-- Lobby screen: wait for race start (any player can tap start) -->
    <div id="lobby-screen" class="screen hidden">
      <div id="lobby-top-bar">
        <button id="lobby-back-btn" class="icon-btn" aria-label="Leave game">
          <svg width="24" height="24" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 4L6 10L14 16" />
          </svg>
        </button>
        <button id="lobby-mute-btn" class="icon-btn" aria-label="Toggle mute">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
            <path class="sound-waves" d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14" />
          </svg>
        </button>
      </div>
      <h1 class="gradient-title">RACER</h1>
      <div id="player-identity" class="player-identity">
        <span class="identity-dot"></span>
        <span id="player-identity-name">Player</span>
      </div>
      <p id="lobby-status" class="status">Waiting for the display…</p>
      <button id="start-btn" class="btn btn-primary" disabled>WAITING…</button>
      <p id="lobby-join-url" class="join-url-hint"></p>
      <div class="ping ping-bottom" id="ping-display">… ms</div>
    </div>

    <!-- Game screen — full-bleed touch surface -->
    <div id="game-screen" class="screen hidden">
      <div id="game-top-bar">
        <span id="hud-name" class="game-name"></span>
        <div class="top-bar-actions">
          <button id="game-mute-btn" class="icon-btn" aria-label="Toggle mute">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
              <path class="sound-waves" d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14" />
            </svg>
          </button>
          <button id="game-pause-btn" class="icon-btn" aria-label="Pause">
            <span class="pause-icon"></span>
          </button>
        </div>
      </div>
      <div id="gesture-hints">
        <div class="hint-bar-item">
          <div class="hint-bar-item__icon">
            <svg width="96" height="56" viewBox="0 0 96 56" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 10L6 28L18 46" opacity="0.55" />
              <path d="M78 10L90 28L78 46" opacity="0.55" />
              <line x1="12" y1="28" x2="84" y2="28" opacity="0.3" />
              <circle cx="48" cy="28" r="8" fill="currentColor" stroke="none" opacity="0.85" />
            </svg>
          </div>
          <div class="hint-bar-item__label">Steer</div>
        </div>
        <div class="hint-bar-item">
          <div class="hint-bar-item__icon">
            <svg width="56" height="72" viewBox="0 0 56 72" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="28" cy="14" r="8" fill="currentColor" stroke="none" opacity="0.85" />
              <line x1="28" y1="22" x2="28" y2="54" opacity="0.35" />
              <path d="M16 48L28 62L40 48" opacity="0.6" />
            </svg>
          </div>
          <div class="hint-bar-item__label">Brake</div>
        </div>
      </div>
      <div id="touch-surface">
        <div id="touch-pad">
          <div id="touch-pad-label">TOUCHPAD</div>
          <div id="touch-feedback"></div>
          <!-- Drag visualization: anchored at the touchdown point so the
               player can see how far they need to drag for full input. -->
          <svg id="touch-debug" viewBox="-200 -200 400 400" width="400" height="400">
            <!-- Steer axis (horizontal) and brake axis (downward only). -->
            <line id="td-axis-h" class="td-axis" x1="-140" y1="0" x2="140" y2="0" />
            <line id="td-axis-v" class="td-axis" x1="0" y1="0" x2="0" y2="140" />
            <!-- Steer dead zone ticks (±20) — fixed. -->
            <line class="td-tick td-tick--inner" x1="-20" y1="-12" x2="-20" y2="12" />
            <line class="td-tick td-tick--inner" x1="20" y1="-12" x2="20" y2="12" />
            <!-- Full-lock ticks at ±maxDrag (repositioned per-gesture). -->
            <line id="td-tick-max-l" class="td-tick td-tick--max" x1="-140" y1="-22" x2="-140" y2="22" />
            <line id="td-tick-max-r" class="td-tick td-tick--max" x1="140" y1="-22" x2="140" y2="22" />
            <!-- Brake dead zone (50, fixed) + brake max (repositioned). -->
            <line class="td-tick td-tick--brake" x1="-12" y1="50" x2="12" y2="50" />
            <line id="td-tick-brake-max" class="td-tick td-tick--brake-max" x1="-18" y1="140" x2="18" y2="140" />
            <!-- Labels (repositioned with the markers). -->
            <text id="td-label-l" class="td-label td-label--max" x="-140" y="-30" text-anchor="middle">MAX</text>
            <text id="td-label-r" class="td-label td-label--max" x="140" y="-30" text-anchor="middle">MAX</text>
            <text id="td-label-brake" class="td-label td-label--brake" x="0" y="160" text-anchor="middle">BRAKE</text>
            <!-- Anchor + finger. -->
            <circle class="td-center" cx="0" cy="0" r="5" />
            <circle id="td-finger" cx="0" cy="0" r="10" />
          </svg>
        </div>
        <div id="game-hud">
          <div class="hud-row hud-big"><span id="hud-place"></span></div>
        </div>
      </div>
      <div id="pause-overlay" class="game-overlay hidden">
        <h1 class="gradient-title">PAUSED</h1>
        <div id="pause-buttons">
          <button id="pause-resume-btn" class="btn btn-primary">RESUME</button>
          <button id="pause-newgame-btn" class="btn btn-secondary">NEW GAME</button>
        </div>
      </div>
      <div class="ping ping-bottom" id="ping-display-game">… ms</div>
    </div>

    <!-- Results screen -->
    <div id="results-screen" class="screen hidden">
      <h1 class="gradient-title">RESULTS</h1>
      <ol id="results-list"></ol>
      <div id="results-buttons">
        <button id="results-play-again-btn" class="btn btn-primary">PLAY AGAIN</button>
        <button id="results-new-game-btn" class="btn btn-secondary">NEW GAME</button>
      </div>
    </div>

    <!-- Reconnect overlay (sits above any screen) -->
    <div id="reconnect-overlay" class="game-overlay hidden">
      <h1 id="reconnect-heading" class="gradient-title">RECONNECTING</h1>
      <p id="reconnect-status" class="status">Connection lost…</p>
      <button id="reconnect-rejoin-btn" class="btn btn-primary hidden">REJOIN</button>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
