name: Tests

on:
  push:
    branches: ['**']
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # Use the package.json script so bun picks up only tests/*.test.ts and
      # skips tests/e2e/*.spec.ts (which need Playwright, not the Bun runner).
      - run: bun run test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      # Keep this tag in sync with @playwright/test in package.json
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - uses: actions/checkout@v6
      # setup-bun@v2 uses `unzip` to extract the Bun archive, which the
      # Playwright image doesn't ship with.
      - name: Install unzip
        run: apt-get update && apt-get install -y unzip
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx playwright test
